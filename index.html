<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQuiz | Master Computer Science</title>
    <!-- Modern Typography: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo">
            <h1>ProQuiz</h1>
        </div>
        <nav>
            <button id="nav-home" class="nav-btn active">Home</button>
            <button id="nav-create" class="nav-btn">Create Quiz</button>
        </nav>
    </header>

    <main id="main-content">
        <!-- Dashboard / Home View -->
        <section id="dashboard" class="view active-view">
            <div class="hero">
                <h2>Master Computer Science</h2>
                <p>Test your knowledge with our comprehensively explained quizzes. Immediate feedback backed by Wikipedia accuracy.</p>
            </div>
            
            <h3 class="section-title">Select a Subject</h3>
            <div class="categories-grid" id="categories-container">
                <!-- Dynamically populated by JS -->
            </div>
        </section>

        <!-- Quiz Execution Interface -->
        <section id="quiz-interface" class="view">
            <div class="quiz-header">
                <h2 id="quiz-title">Subject Name</h2>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <p class="progress-text" id="progress-text">Question 1 of 5</p>
            </div>

            <div class="question-container glass-panel">
                <h3 id="current-question-text">Question goes here?</h3>
                <div class="options-grid" id="options-container">
                    <!-- Dynamically populated options -->
                </div>
                
                <div id="explanation-box" class="explanation-box hidden">
                    <div class="explanation-header">
                        <span id="explanation-status" class="status-badge"></span>
                    </div>
                    <p id="explanation-text"></p>
                    <button id="next-btn" class="primary-btn">Next Question <span class="arrow">→</span></button>
                </div>
            </div>
        </section>

        <!-- Result Evaluation View -->
        <section id="result-view" class="view">
            <div class="result-card glass-panel">
                <h2>Quiz Completed!</h2>
                <div class="score-circle">
                    <span id="final-score">0/0</span>
                </div>
                <p id="score-message">Great job!</p>
                <div class="result-actions">
                    <button class="primary-btn" onclick="showDashboard()">Back to Dashboard</button>
                </div>
            </div>
        </section>

        <!-- Create Custom Quiz Form -->
        <section id="create-view" class="view">
            <div class="glass-panel form-panel">
                <h2>Create Custom Quiz</h2>
                <form id="quiz-form">
                    <div class="input-group">
                        <label for="question">Question Text</label>
                        <input type="text" id="question" required placeholder="Type your question here...">
                    </div>
                    <div class="options-inputs">
                        <div class="input-group">
                            <label for="option1">Option 1</label>
                            <input type="text" id="option1" required>
                        </div>
                        <div class="input-group">
                            <label for="option2">Option 2</label>
                            <input type="text" id="option2" required>
                        </div>
                        <div class="input-group">
                            <label for="option3">Option 3</label>
                            <input type="text" id="option3" required>
                        </div>
                        <div class="input-group">
                            <label for="option4">Option 4</label>
                            <input type="text" id="option4" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="correct">Correct Answer (1-4)</label>
                        <input type="number" id="correct" min="1" max="4" required>
                    </div>
                    <div class="input-group">
                        <label for="explanation">Explanation & Source (Optional)</label>
                        <textarea id="explanation" rows="3" placeholder="Provide background info and citation (e.g., 'Source: Google/Wikipedia')"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="secondary-btn" onclick="addQuestion()">Add to Draft</button>
                        <button type="button" class="primary-btn" onclick="publishCustomQuiz()">Publish Quiz</button>
                    </div>
                </form>
                <div class="draft-questions">
                    <h3>Draft Questions (<span id="draft-count">0</span>)</h3>
                    <ul id="question-list"></ul>
                </div>
            </div>
        </section>
    </main>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
